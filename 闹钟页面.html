<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华为闹钟 UI 复刻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F1F3F5; /* 略带灰色的背景 */
            user-select: none;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }

        /* 模拟开关 */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #E0E0E0;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #007DFF; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 底部导航激活状态 */
        .nav-active { color: #007DFF; }
    </style>
</head>
<body class="flex flex-col h-screen max-w-md mx-auto bg-[#F1F3F5] relative overflow-hidden">

    <div class="h-8 w-full"></div>

    <header class="flex justify-between items-center px-6 py-4">
        <h1 class="text-2xl font-medium text-gray-800">闹钟</h1>
        <div class="flex flex-col space-y-1">
            <div class="w-1 h-1 bg-gray-600 rounded-full"></div>
            <div class="w-1 h-1 bg-gray-600 rounded-full"></div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center pt-12">
        <div class="flex items-baseline mb-2">
            <span class="text-lg font-normal text-gray-600 mr-2">中午</span>
            <span class="text-6xl font-light tracking-tight text-gray-900" id="current-time">12:36:19</span>
        </div>
        <p class="text-gray-500 text-lg mt-16 mb-8">所有闹钟已关闭</p>

        <div class="w-full px-4 space-y-3 overflow-y-auto pb-32">
            
            <div class="bg-white rounded-3xl p-5 flex justify-between items-center shadow-sm">
                <div>
                    <div class="flex items-baseline">
                        <span class="text-sm text-gray-500 mr-1">清晨</span>
                        <span class="text-3xl font-medium text-gray-400">6:55</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-1">闹钟，每天</div>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="bg-white rounded-3xl p-5 flex justify-between items-center shadow-sm">
                <div>
                    <div class="flex items-baseline">
                        <span class="text-sm text-gray-500 mr-1">早上</span>
                        <span class="text-3xl font-medium text-gray-400">8:20</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-1">早上好，每天</div>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="bg-white rounded-3xl p-5 flex justify-between items-center shadow-sm">
                <div>
                    <div class="flex items-baseline">
                        <span class="text-sm text-gray-500 mr-1">早上</span>
                        <span class="text-3xl font-medium text-gray-400">8:30</span>
                    </div>
                    <div class="text-xs text-gray-400 mt-1">早上好，每天</div>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </main>

    <div class="absolute bottom-24 left-1/2 transform -translate-x-1/2">
        <button class="w-14 h-14 bg-[#007DFF] text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </button>
    </div>

    <footer class="bg-[#F1F3F5] border-t border-gray-200 py-3 px-2 flex justify-around items-center">
        <div class="flex flex-col items-center nav-active">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"/><path d="M13 7h-2v5.414l3.293 3.293 1.414-1.414L13 11.586z"/></svg>
            <span class="text-[10px]">闹钟</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
            <span class="text-[10px]">世界时钟</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[10px]">秒表</span>
        </div>
        <div class="flex flex-col items-center text-gray-500">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <span class="text-[10px]">计时器</span>
        </div>
    </footer>

    <script>
        // 简单的动态时钟脚本
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('current-time').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
